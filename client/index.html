    <script>
      // Apply dark mode immediately from localStorage (before React hydrates)
      try {
        var theme = localStorage.getItem('aa_theme');
        if (theme === 'light') document.documentElement.classList.remove('dark');
      } catch(e) {}

      // Catch all errors: window errors, unhandled rejections, and module load failures
      function showError(msg) {
        var root = document.getElementById('root');
        if (root && root.querySelector('#aa-loader')) {
          root.innerHTML = '<div style="padding:40px;font-family:system-ui;color:#e5e5e5;background:#0a0a14;min-height:100vh"><h1 style="color:#06b6d4;margin:0 0 12px">AlphaArena</h1><p style="margin:0 0 8px">Failed to load the app.</p><p style="color:#888;font-size:13px;margin:0 0 16px;word-break:break-word">' + msg + '</p><a href="javascript:location.reload()" style="color:#06b6d4;text-decoration:underline">Reload page</a></div>';
        }
      }
      window.addEventListener('error', function(e) { showError(e.message || 'Script error'); });
      window.addEventListener('unhandledrejection', function(e) { showError(e.reason ? (e.reason.message || String(e.reason)) : 'Unhandled promise rejection'); });

      // Timeout: if React hasn't mounted after 15s, show error
      setTimeout(function() {
        var loader = document.getElementById('aa-loader');
        if (loader) {
          showError('App took too long to load. This may be caused by a network issue or browser extension blocking scripts. Try disabling extensions or refreshing.');
        }
      }, 15000);

      // Clear stale service workers
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          registrations.forEach(function(reg) { reg.unregister(); });
        });
        if (typeof caches !== 'undefined') {
          caches.keys().then(function(names) {
            names.forEach(function(name) { caches.delete(name); });
          });
        }
      }
    </script>
