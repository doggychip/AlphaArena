      // Global error handler to catch JS crashes that cause blank page
      window.addEventListener('error', function(e) {
        var root = document.getElementById('root');

          root.innerHTML = '<div style="padding:40px;font-family:system-ui;color:#e5e5e5;background:#0a0a0f;min-height:100vh"><h1 style="color:#06b6d4">AlphaArena</h1><p>Something went wrong loading the app.</p><p style="color:#888;font-size:14px">Error: ' + (e.message || 'Unknown') + '</p><p style="margin-top:16px"><a href="javascript:location.reload()" style="color:#06b6d4">Reload page</a></p></div>';
        }
      });
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          registrations.forEach(function(reg) { reg.unregister(); });
        });
        if (typeof caches !== 'undefined') {
          caches.keys().then(function(names) {
            names.forEach(function(name) { caches.delete(name); });
          });
        }
      }
